
default: &default
  adapter: postgresql
  encoding: unicode

  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV['DB_USERNAME'] %>
  password: <%= ENV['DB_PASSWORD'] %>

development:
  <<: *default
  database: railpress_development
  username: ultimacraft

test:
  <<: *default
  database: railpress_test

production:
  <<: *default
  database: railpress_production